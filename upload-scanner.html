<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mise.AI — Upload &amp; Scanner Module</title>
<link href="https://fonts.googleapis.com/css2?family=Armata&family=JetBrains+Mono:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-app:#F8F6F0; --bg-card:#F8F6F0; --bg-recessed:#EEECE6;
  --text-hero:#2A2118; --text-muted:#3D3226; --text-faint:#3D3226;
  --brand-accent:#B8722E; --brand-accent-hover:#8C4A1F;
  --alert-success:#2A663B; --alert-success-wash:rgba(42,102,59,0.09);
  --alert-danger:#A33829; --alert-danger-wash:rgba(163,56,41,0.09);
  --border-subtle:#3D3226;
  --font-mono:'JetBrains Mono',monospace; --font-display:'Armata',sans-serif; --font-serif:'EB Garamond',Georgia,serif;
}
body{font-family:var(--font-serif);background:var(--bg-app);color:var(--text-hero);padding:24px;max-width:760px;margin:0 auto}
h1{font-family:var(--font-display);font-size:20px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.sub{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);letter-spacing:.06em;margin-bottom:24px}

/* ── DOC TYPE PICKER ── */
.doctype-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.doctype-btn{font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  padding:9px 14px;border:1.5px solid var(--border-subtle);background:var(--bg-card);color:var(--text-muted);
  border-radius:20px;cursor:pointer;transition:.15s}
.doctype-btn:hover{border-color:var(--brand-accent)}
.doctype-btn.on{background:var(--brand-accent);border-color:var(--brand-accent);color:var(--bg-card);font-weight:700}

/* ── UPLOAD MODE TABS ── */
.mode-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg-recessed);border-radius:8px;padding:3px}
.mode-tab{flex:1;font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  padding:10px;border:none;background:none;color:var(--text-muted);cursor:pointer;border-radius:6px;transition:.15s}
.mode-tab.on{background:var(--bg-card);color:var(--brand-accent);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── DROP ZONE ── */
.dropzone{border:2px dashed var(--border-subtle);border-radius:10px;padding:40px 20px;text-align:center;
  background:var(--bg-card);cursor:pointer;transition:.15s}
.dropzone:hover, .dropzone.drag{border-color:var(--brand-accent);background:var(--alert-success-wash,rgba(184,114,46,.05))}
.dropzone .icon{font-size:32px;margin-bottom:10px}
.dropzone .label{font-family:var(--font-serif);font-size:17px;margin-bottom:6px}
.dropzone .hint{font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}
input[type=file]{display:none}

/* ── CAMERA BUTTON (mobile) ── */
.cam-row{display:flex;gap:10px;margin-top:14px}
.cam-btn{flex:1;font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  padding:12px;border:1.5px solid var(--brand-accent);background:var(--bg-card);color:var(--brand-accent);
  border-radius:8px;cursor:pointer;font-weight:700;transition:.15s}
.cam-btn:hover{background:var(--brand-accent);color:var(--bg-card)}

/* ── STATUS / PREVIEW ── */
.status{margin-top:18px;padding:14px 16px;border-radius:8px;font-family:var(--font-mono);font-size:13px;display:none}
.status.show{display:block}
.status.pending{background:var(--bg-recessed);color:var(--text-muted)}
.status.success{background:var(--alert-success-wash);color:var(--alert-success)}
.status.error{background:var(--alert-danger-wash);color:var(--alert-danger)}

/* ── CSV/XLSX PREVIEW TABLE ── */
.preview-wrap{margin-top:16px;max-height:280px;overflow:auto;border:1px solid var(--border-subtle);border-radius:8px;display:none}
.preview-wrap.show{display:block}
table.preview{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px}
table.preview th{background:var(--bg-recessed);position:sticky;top:0;text-align:left;padding:8px 10px;
  text-transform:uppercase;letter-spacing:.04em;font-size:11px;color:var(--text-muted)}
table.preview td{padding:7px 10px;border-top:1px solid var(--bg-recessed)}
table.preview tr:nth-child(even){background:rgba(0,0,0,.015)}

.confirm-btn{margin-top:14px;width:100%;font-family:var(--font-mono);font-size:13px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:14px;border:none;border-radius:8px;
  background:var(--brand-accent);color:var(--bg-card);cursor:pointer;display:none}
.confirm-btn.show{display:block}
.confirm-btn:hover{background:var(--brand-accent-hover)}
.confirm-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── RECENT UPLOADS LIST ── */
.recent{margin-top:32px}
.recent h2{font-family:var(--font-display);font-size:14px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;color:var(--text-muted)}
.recent-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;
  background:var(--bg-card);border:1px solid var(--bg-recessed);border-radius:6px;margin-bottom:6px;font-size:14px}
.recent-item .rtype{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;color:var(--brand-accent);letter-spacing:.04em}
.recent-item .rstatus{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;padding:3px 8px;border-radius:10px}
.recent-item .rstatus.pending{background:var(--bg-recessed);color:var(--text-muted)}
.recent-item .rstatus.success{background:var(--alert-success-wash);color:var(--alert-success)}
</style>
</head>
<body>

<h1>Upload &amp; Scanner</h1>
<div class="sub">Invoices · recipes · waste lists · POS printouts · schedules · order sheets · CSV · Excel</div>

<div class="doctype-row" id="doctypeRow">
  <button class="doctype-btn on" data-type="invoice">Invoice</button>
  <button class="doctype-btn" data-type="recipe">Recipe</button>
  <button class="doctype-btn" data-type="waste_list">Waste List</button>
  <button class="doctype-btn" data-type="pos_printout">POS Printout</button>
  <button class="doctype-btn" data-type="schedule">Schedule</button>
  <button class="doctype-btn" data-type="order_sheet">Order Sheet</button>
</div>

<div class="mode-tabs">
  <button class="mode-tab on" data-mode="scan">Photo / PDF Scan</button>
  <button class="mode-tab" data-mode="sheet">CSV / Excel</button>
</div>

<!-- SCAN MODE -->
<div id="scanMode">
  <div class="dropzone" id="scanDropzone">
    <div class="icon">📷</div>
    <div class="label">Drop a photo or PDF here</div>
    <div class="hint">or tap to choose a file — JPG, PNG, HEIC, PDF</div>
  </div>
  <input type="file" id="scanInput" accept="image/*,application/pdf">
  <div class="cam-row">
    <button class="cam-btn" id="camBtn">📸 Use Camera</button>
  </div>
  <input type="file" id="camInput" accept="image/*" capture="environment">
</div>

<!-- SHEET MODE -->
<div id="sheetMode" style="display:none">
  <div class="dropzone" id="sheetDropzone">
    <div class="icon">📊</div>
    <div class="label">Drop a CSV or Excel file here</div>
    <div class="hint">or tap to choose a file — .csv, .xlsx, .xls</div>
  </div>
  <input type="file" id="sheetInput" accept=".csv,.xlsx,.xls">
  <div class="preview-wrap" id="previewWrap"><table class="preview" id="previewTable"></table></div>
  <button class="confirm-btn" id="confirmBtn">Confirm &amp; Upload Rows</button>
</div>

<div class="status" id="statusBox"></div>

<div class="recent">
  <h2>Recent Uploads</h2>
  <div id="recentList"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG — wire these to the real restaurant before dropping into the dashboard
// ═══════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://awzybqmplfqitzijkvdw.supabase.co';
const PUBLISHABLE_KEY = 'sb_publishable_h0VYK8QqyGLqUS2Rg3MDTA_3B71wuxv';
// TODO: replace with the real logged-in restaurant's UUID before going live.
// Using demo:true for now so this module is testable standalone.
const RESTAURANT_ID = null; // set to a real UUID string when wiring into the live dashboard
const DEMO_MODE = true;

let activeDocType = 'invoice';
let activeMode = 'scan';
let parsedRows = [];
let recentUploads = [];

// ── DOC TYPE PICKER ──
document.getElementById('doctypeRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.doctype-btn');
  if (!btn) return;
  document.querySelectorAll('.doctype-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeDocType = btn.dataset.type;
});

// ── MODE TABS ──
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('on'));
    tab.classList.add('on');
    activeMode = tab.dataset.mode;
    document.getElementById('scanMode').style.display = activeMode === 'scan' ? 'block' : 'none';
    document.getElementById('sheetMode').style.display = activeMode === 'sheet' ? 'block' : 'none';
    hideStatus(); hidePreview();
  });
});

function showStatus(msg, type) {
  const box = document.getElementById('statusBox');
  box.textContent = msg;
  box.className = 'status show ' + type;
}
function hideStatus() {
  document.getElementById('statusBox').className = 'status';
}
function hidePreview() {
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('confirmBtn').classList.remove('show');
  parsedRows = [];
}

// ═══════════════════════════════════════════════════════════════════
// SCAN MODE — photo/PDF -> upload-scan edge function -> Supabase Storage
// ═══════════════════════════════════════════════════════════════════
function wireFileInput(inputEl, dropzoneEl) {
  dropzoneEl.addEventListener('click', () => inputEl.click());
  dropzoneEl.addEventListener('dragover', (e) => { e.preventDefault(); dropzoneEl.classList.add('drag'); });
  dropzoneEl.addEventListener('dragleave', () => dropzoneEl.classList.remove('drag'));
  dropzoneEl.addEventListener('drop', (e) => {
    e.preventDefault(); dropzoneEl.classList.remove('drag');
    if (e.dataTransfer.files.length) handleScanFile(e.dataTransfer.files[0]);
  });
  inputEl.addEventListener('change', () => {
    if (inputEl.files.length) handleScanFile(inputEl.files[0]);
  });
}
wireFileInput(document.getElementById('scanInput'), document.getElementById('scanDropzone'));
document.getElementById('camBtn').addEventListener('click', () => document.getElementById('camInput').click());
document.getElementById('camInput').addEventListener('change', (e) => {
  if (e.target.files.length) handleScanFile(e.target.files[0]);
});

async function handleScanFile(file) {
  showStatus('Uploading ' + file.name + '…', 'pending');
  const form = new FormData();
  form.append('file', file);
  form.append('doc_type', activeDocType);
  if (DEMO_MODE || !RESTAURANT_ID) { form.append('demo', 'true'); }
  else { form.append('restaurant_id', RESTAURANT_ID); }

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/upload-scan', {
      method: 'POST',
      headers: { apikey: PUBLISHABLE_KEY },
      body: form,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    showStatus('✓ Received — ' + activeDocType.replace('_', ' ') + '. It will show up in your data shortly.', 'success');
    addRecent(activeDocType, file.name, 'pending');
  } catch (err) {
    showStatus('✗ ' + err.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════
// SHEET MODE — CSV/XLSX -> parsed client-side -> preview -> intake-upload
// ═══════════════════════════════════════════════════════════════════
wireFileInput(document.getElementById('sheetInput'), document.getElementById('sheetDropzone'));

document.getElementById('sheetInput').addEventListener('change', (e) => {
  if (e.target.files.length) handleSheetFile(e.target.files[0]);
});
// re-hook the dropzone directly since wireFileInput's drop handler calls handleScanFile by default —
// override here so sheet mode's dropzone calls the right handler
const sheetDz = document.getElementById('sheetDropzone');
sheetDz.addEventListener('drop', (e) => {
  e.preventDefault(); e.stopImmediatePropagation();
  if (e.dataTransfer.files.length) handleSheetFile(e.dataTransfer.files[0]);
}, true);

function handleSheetFile(file) {
  const name = file.name.toLowerCase();
  showStatus('Reading ' + file.name + '…', 'pending');

  if (name.endsWith('.csv')) {
    const reader = new FileReader();
    reader.onload = (e) => parseCSVText(e.target.result);
    reader.readAsText(file);
  } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    if (typeof XLSX === 'undefined') {
      showStatus('✗ Excel reader failed to load — check your connection and try again', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true });
      renderPreview(rows);
    };
    reader.readAsArrayBuffer(file);
  } else {
    showStatus('✗ Unsupported file — use .csv, .xlsx, or .xls', 'error');
  }
}

function parseCSVText(text) {
  // Simple, dependency-free CSV parse: handles quoted fields with commas/quotes inside.
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (field !== '' || row.length) { row.push(field); rows.push(row); row = []; field = ''; }
        if (c === '\r' && next === '\n') i++;
      } else field += c;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  renderPreview(rows.filter(r => r.some(cell => String(cell).trim() !== '')));
}

function renderPreview(rows) {
  if (!rows.length) { showStatus('✗ No data found in file', 'error'); return; }
  parsedRows = rows;
  const table = document.getElementById('previewTable');
  const maxRows = 15; // preview cap — full data still gets uploaded, this is just a visual check
  let html = '<thead><tr>';
  rows[0].forEach(h => html += `<th>${escapeHtml(String(h))}</th>`);
  html += '</tr></thead><tbody>';
  for (let i = 1; i < Math.min(rows.length, maxRows + 1); i++) {
    html += '<tr>' + rows[i].map(c => `<td>${escapeHtml(String(c ?? ''))}</td>`).join('') + '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
  document.getElementById('previewWrap').classList.add('show');
  document.getElementById('confirmBtn').classList.add('show');
  showStatus(`Found ${rows.length - 1} rows. Review above, then confirm.`, 'pending');
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.getElementById('confirmBtn').addEventListener('click', async () => {
  if (!parsedRows.length) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  showStatus('Uploading rows…', 'pending');

  // Map generic spreadsheet columns to intake-upload's expected shape.
  // Expected headers (case-insensitive, flexible order): date, item, category, qty, price
  const headers = parsedRows[0].map(h => String(h).trim().toLowerCase());
  const idx = {
    d: headers.findIndex(h => h.includes('date')),
    i: headers.findIndex(h => h.includes('item') || h.includes('name') || h.includes('description')),
    c: headers.findIndex(h => h.includes('categ')),
    q: headers.findIndex(h => h.includes('qty') || h.includes('quantity')),
    p: headers.findIndex(h => h.includes('price') || h.includes('cost')),
  };
  if (idx.d === -1 || idx.i === -1 || idx.q === -1 || idx.p === -1) {
    showStatus('✗ Could not find date/item/qty/price columns — check your file\'s headers', 'error');
    btn.disabled = false;
    return;
  }

  const dataRows = parsedRows.slice(1).map(r => ({
    d: formatDateCell(r[idx.d]),
    i: String(r[idx.i] ?? '').trim(),
    c: idx.c > -1 ? String(r[idx.c] ?? '').trim() : undefined,
    q: Number(r[idx.q]),
    p: Number(String(r[idx.p]).replace(/[^0-9.\-]/g, '')),
  })).filter(r => r.d && r.i);

  const body = { rows: dataRows };
  if (DEMO_MODE || !RESTAURANT_ID) body.demo = true; else body.restaurant_id = RESTAURANT_ID;

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/intake-upload', {
      method: 'POST',
      headers: { apikey: PUBLISHABLE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    let msg = `✓ Uploaded ${data.inserted} rows.`;
    if (data.rejected && data.rejected.length) msg += ` (${data.rejected.length} rows skipped — check console)`;
    showStatus(msg, 'success');
    if (data.rejected && data.rejected.length) console.warn('Rejected rows:', data.rejected);
    addRecent('CSV/Excel', dataRows.length + ' rows', 'success');
    hidePreview();
  } catch (err) {
    showStatus('✗ ' + err.message, 'error');
  } finally {
    btn.disabled = false;
  }
});

function formatDateCell(v) {
  if (v == null || v === '') return '';
  // Excel serial date number
  if (typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return d.toISOString().slice(0, 10);
  }
  const s = String(v).trim();
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  const m2 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m2) return `${m2[3]}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;
  return s;
}

// ── RECENT UPLOADS (session-only list, visual confirmation) ──
function addRecent(type, label, status) {
  recentUploads.unshift({ type, label, status, at: new Date() });
  recentUploads = recentUploads.slice(0, 8);
  renderRecent();
}
function renderRecent() {
  const el = document.getElementById('recentList');
  if (!recentUploads.length) { el.innerHTML = '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">Nothing uploaded yet this session.</div>'; return; }
  el.innerHTML = recentUploads.map(u => `
    <div class="recent-item">
      <div><span class="rtype">${escapeHtml(u.type)}</span> — ${escapeHtml(u.label)}</div>
      <span class="rstatus ${u.status}">${u.status}</span>
    </div>
  `).join('');
}
renderRecent();
</script>
</body>
</html>
